<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportClub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <div class="back-container">
                <a href="login.html" class="btn-back">← Volver al inicio de sesión</a>
            </div>

            <img src="image/logo_empresa_letra_v1.png" alt="SportClub Logo" class="logo">
            <h2>Crea tu cuenta</h2>
            <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: #666;">Completa el formulario para crear tu cuenta.</p>

            <!-- 1. Agregado id="registerForm" -->
            <form id="registerForm" action="#"> 
                <div class="input-group">
                    <label for="reg-email">Correo electrónico *</label>
                    <input type="email" id="reg-email" placeholder="ejemplo@correo.com" required> 
                </div>

                <div class="input-group">
                    <label for="reg-password">Contraseña *</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required> 
                </div>

                <div class="input-group">
                    <label for="reg-name">Nombre completo</label>
                    <!-- 2. Cambiado id a "reg-name" -->
                    <input type="text" id="reg-name" placeholder="Tu nombre"> 
                </div>
                
                <div class="input-group">
                    <label for="nivel">Nivel de condición física</label>
                    <select id="nivel" style="width: 100%; padding: 0.8rem; border: 1.5px solid #4b1d6e; border-radius: 6px; background: white;">
                        <option value="principiante">Principiante</option>
                        <option value="intermedio">Intermedio</option>
                        <option value="avanzado">Avanzado</option>
                    </select>
                </div>

                <button type="submit" class="btn-login">Registrarse</button>
            </form>
        </section>
    </main>
    <!-- 3. Enlace al archivo JavaScript -->
    <script src="js/register.js"></script>
</body>
</html>
