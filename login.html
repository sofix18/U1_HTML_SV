<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SportClub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <div class="back-container">
                <a href="index.html" class="btn-back">← Volver</a>
            </div>

            <img src="image/logo_empresa_letra_v1.png" alt="SportClub Logo" class="logo">
            <h2>Iniciar sesión</h2>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Ingresa tu correo" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <p id="error-message" style="color: red; display: none; text-align: center; margin-bottom: 10px; font-weight: bold;"></p>
                
                <button type="submit" class="btn-login">Ingresar</button>
            </form>

            <div class="footer-links">
                <a href="recover.html">¿Olvidaste tu contraseña?</a>
                <span>|</span>
                <a href="register.html">Registrarse</a>
            </div>
        </section>
    </main>

    <script src="js/login.js?v=2"></script>
</body>
</html>
